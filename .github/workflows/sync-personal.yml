name: Sync main to personal

on:
  push:
    branches:
      - main

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR to merge main into personal
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base personal \
            --head main \
            --title "Sync: merge main into personal" \
            --body "Automated PR to keep \`personal\` up to date with \`main\`." \
            || echo "PR already exists or nothing to merge"
